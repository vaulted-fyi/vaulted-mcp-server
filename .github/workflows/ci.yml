name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/cache@v4
        id: node-cache
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
      - run: npm ci
        if: steps.node-cache.outputs.cache-hit != 'true'
      - run: npm run lint
      - run: npm run test -- --reporter=default --reporter=junit --outputFile.junit=test-results/junit.xml
      - uses: testglance/action@v1
        if: always()
        with:
          github-token: ${{ github.token }}
      - run: npm run build
